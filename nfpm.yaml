name: logbox
arch: ${PKG_ARCH}
platform: linux
version: ${VERSION}
release: 1
section: utils
priority: optional
maintainer: eldesh <nephits@gmail.com>
description: Tail-style live log wrapper with scrollback and follow mode.
license: MIT
vendor: logbox
homepage: https://github.com/eldesh/logbox
contents:
  - src: ${PKG_BIN}
    dst: /usr/bin/logbox
    expand: true
    file_info:
      mode: 0755
  - src: ./dist/man/logbox.1
    dst: /usr/share/man/man1/logbox.1
    file_info:
      mode: 0644
  - src: ./LICENSE
    dst: /usr/share/doc/logbox/LICENSE
    file_info:
      mode: 0644

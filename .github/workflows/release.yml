name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag format
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got: $tag" >&2
            exit 1
          fi

      - name: Verify tagged commit is in master
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin master
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "Tagged commit $GITHUB_SHA is not contained in origin/master" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Extract version from tag
        shell: bash
        run: |
          set -euo pipefail
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build binaries
        run: make bin

      - name: Build deb packages
        run: make deb VERSION="${VERSION}"

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum logbox-linux-* logbox_*.deb > SHA256SUMS
          )

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/logbox-linux-*
            dist/logbox_*.deb
            dist/SHA256SUMS

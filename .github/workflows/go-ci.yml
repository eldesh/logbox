name: Go CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Format, Test, Build Binary And Deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify gofmt
        run: make fmt-check

      - name: Verify go.mod / go.sum are tidy
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
          args: --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build binaries
        run: make bin

      - name: Build deb packages
        run: make deb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logbox-dist-${{ github.event_name }}-${{ github.run_number }}
          path: |
            dist/logbox-linux-*
            dist/logbox_*.deb
          if-no-files-found: error
